name: 趋势波段选股 - 尾盘选股

on:
  schedule:
    # 北京时间 14:30 = UTC 06:30 (周一至周五)
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  screen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare

      - name: Run trend scanner
        env:
          SC_KEY: ${{ secrets.SC_KEY }}
        run: python trend_scanner.py

      - name: Save output to repo
        run: |
          mkdir -p output
          TODAY=$(date +%Y-%m-%d)
          if [ -f ~/trend_scanner_output/${TODAY}.json ]; then
            cp ~/trend_scanner_output/${TODAY}.json output/latest.json
            echo "Saved JSON output"
          else
            echo "WARNING: No JSON output found at ~/trend_scanner_output/${TODAY}.json"
          fi
          if [ -f ~/trend_scanner_output/${TODAY}.txt ]; then
            cp ~/trend_scanner_output/${TODAY}.txt output/latest.txt
            echo "Saved TXT output"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 $(date +%Y-%m-%d) 选股结果"
            git push
          fi
