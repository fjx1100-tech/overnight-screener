name: 趋势波段选股 — 尾盘选股
on:
  schedule:
    - cron: '30 6 * * 1-5'  # 北京时间 14:30
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare

      - name: Run trend scanner
        env:
          SC_KEY: ${{ secrets.SC_KEY }}
        run: python trend_scanner.py

      - name: Save output to repo
        run: |
          mkdir -p output
          cp ~/trend_scanner_output/$(date +%Y-%m-%d).json output/latest.json
          cp ~/trend_scanner_output/$(date +%Y-%m-%d).txt output/latest.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add output/
          git diff --cached --quiet || (git commit -m "📊 $(date +%Y-%m-%d) 选股结果" && git push)
